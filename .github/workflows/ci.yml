name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint
        run: ruff check app scripts training

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t waste-ai:${{ github.sha }} .
